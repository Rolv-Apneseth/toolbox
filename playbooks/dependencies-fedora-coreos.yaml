- name: Install RPM packages via rpm-ostree
  become: yes
  command: >-
    rpm-ostree install -y --apply-live --idempotent --allow-inactive
    ShellCheck
    bats
    codespell
    fish
    gcc
    golang
    golang-github-cpuguy83-md2man
    httpd-tools
    meson
    ninja-build
    shadow-utils-subid-devel
    udisks2

- include_tasks: dependencies-common.yaml
